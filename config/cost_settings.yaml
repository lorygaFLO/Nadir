simulation_settings:
  currency: "EUR"
  time_horizon_periods: 100
  random_seed: 42
  period_budget: 50000   # default per-period investment for the Focus subject

# KPI definitions are fully generic: add as many entries as needed.
# Phase 1 activates only the two below, but the engine handles any number.
kpi_definitions:
  market_share_pct:
    higher_is_better: true
    cost_function_type: "quadratic"
    alpha: 1500000
    drift_noise_std: 0.02      # std dev of per-period random perturbation (fraction of current state)
    passive_decay_rate: -0.01  # mean per-period drift applied when no investment is made

  unit_production_cost:
    higher_is_better: false
    cost_function_type: "linear"
    alpha: 800000
    drift_noise_std: 0.015
    passive_decay_rate: 0.01   # costs organically creep up 1%/period if untouched
